name: hemo_tro_app
description: "Hemo Tro - Advanced Flutter Streaming App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # HTTP and networking
  http: ^1.1.0
  
  # State management
  provider: ^6.0.0
  
  # Video player
  video_player: ^2.7.0
  
  # Local storage
  shared_preferences: ^2.2.0
  
  # UI
  flutter_svg: ^2.0.0
  
  # Encryption
  crypto: ^3.0.0
  
  # Utilities
  intl: ^0.19.0
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
